<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission Form</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="icon" href="img/programming.webp" type="image">
</head>

<body>
    <nav>
        <ul>
            <li><a href="admission.html" onclick="showSection('admission')">Admission</a></li>
        </ul>
    </nav>
    <section id="home" class="active">
        <h1>Welcome To Admission Form</h1>
    </section>
    <div class="container">
        <h1>🏠 School Admission Form</h1>
        <form>
            <div class="section">
                <h2>Student's Information :</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="text">Class Roll No. :</label><input type="text"></div>
                    <div class="input_group"><label for="text">Student's Name :</label><input type="text"></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="text">Date of birth (Month-Day-Year):</label><input
                            type="date"></div>
                    <div class="input_group"><label>Religion</label><select>
                            <option value="Islam">Islam</option>
                            <option value="Hindu">Hindu</option>
                        </select></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">Student's Mobile No.:</label><input type="number"></div>
                    <div class="input_group"><label for="">Student's Image (Height : 150px Width: 120px)</label><input
                            type="file"></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="gender">Gender</label><select>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select></div>
                    <div class="input_group"><label for="text">Blood Group</label><select>
                            <option value="A+">A+</option>
                            <option value="B+">B+</option>
                            <option value="O+">O+</option>
                        </select></div>
                </div>
            </div>
            <div class="section">
                <h2>Father's Information :</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label>Father's Name :</label><input type="text"></div>
                    <div class="input_group"><label>Mobile No.:</label><input type="tel"></div>
                    <div class="input_group"><label>Mother's Name :</label><input type="text"></div>
                </div>
            </div>
            <div class="section">
                <h2>Guardian's Information :</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">Guardian's Name :</label><input type="text"></div>
                    <div class="input_group"><label for="">Relation with Student :</label><input type="text"></div>
                    <div class="input_group"><label for="">Mobile No.:</label><input type="tel"></div>
                </div>
            </div>
            <div class="section">
                <h2>Permanent Address:</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">House Name:</label><input type="text"></div>
                    <div class="input_group"><label for="">Village:</label><input type="text"></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">P.O.:</label><input type="text"></div>
                    <div class="input_group"><label for="">Upozila:</label><input type="text"></div>
                    <div class="input_group"><label for="">District:</label><input type="text"></div>
                </div>
            </div>
            <div class="section">
                <h2>Present Address:</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">House Name:</label><input type="text"></div>
                    <div class="input_group"><label for="">Village:</label><input type="text"></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label for="">P.O.:</label><input type="text"></div>
                    <div class="input_group"><label for="">Upozila:</label><input type="text"></div>
                    <div class="input_group"><label for="">District:</label><input type="text"></div>
                </div>
            </div>
            <div class="section">
                <h2>Academic Information :</h2>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label>Select The Class :</label><select>
                            <option value="Ten">Ten</option>
                            <option value="Eleven">Eleven</option>
                            <option value="Diploma">Diploma</option>
                        </select></div>
                    <div class="input_group"><label>Select The Group</label><select>
                            <option value="Humanities">Humanities</option>
                            <option value="Science">Science</option>
                            <option value="Social History">Social History</option>
                        </select></div>
                </div>
                <div class="row" style="border: 1px dashed lightgray; padding: 10px;">
                    <div class="input_group"><label>Nationality :</label><select>
                            <option value="Bangladeshi">Bangladeshi</option>
                        </select></div>
                    <div class="input_group">
                        <label>Session :</label>
                        <input type="text" value="2025-2026" readonly>
                    </div>
                </div><button type="submit">Submit Admission Form</button>
        </form>
</body>

</html>
