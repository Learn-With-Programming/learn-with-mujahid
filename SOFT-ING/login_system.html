<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Label | Login</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome 6 (Free Icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- External CSS -->
    <link rel="stylesheet" href="css/login_system.css" />
  </head>

  <body>
    <div class="login-wrapper">
      <!-- Left Side - Brand/Illustration Area -->
      <div class="login-brand">
        <div class="brand-content">
          <div class="logo-icon">
            <i class="fas fa-cube"></i>
          </div>
          <h1>Professional<br />Label</h1>
          <p class="tagline">Smart Identity Solutions</p>
          <div class="brand-features">
            <span><i class="fas fa-check-circle"></i> Secure Access</span>
            <span><i class="fas fa-check-circle"></i> Real‑time Analytics</span>
            <span><i class="fas fa-check-circle"></i> Enterprise Grade</span>
          </div>
        </div>
        <div class="brand-footer">
          <p>&copy; 2026 ProLabel Inc.</p>
        </div>
      </div>

      <!-- Right Side - Login Form -->
      <div class="login-form">
        <div class="form-container">
          <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your dashboard</p>
          </div>

          <!-- Social Login Buttons (optional, but adds realism) -->
          <div class="social-login">
            <button class="social-btn google">
              <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn github">
              <i class="fab fa-github"></i> GitHub
            </button>
          </div>

          <div class="divider">
            <span>or sign in with email</span>
          </div>

          <!-- Login Form -->
          <form action="#" method="POST">
            <div class="input-group">
              <label for="email"
                ><i class="fas fa-envelope"></i> Email Address</label
              >
              <input
                type="email"
                id="email"
                placeholder="you@company.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="password"><i class="fas fa-lock"></i> Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  required
                />
                <span class="toggle-password"><i class="fas fa-eye"></i></span>
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" checked /> Remember me
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
              <i class="fas fa-arrow-right-to-bracket"></i> Sign In
            </button>

            <p class="signup-text">
              Don't have an account? <a href="#">Create one</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
